<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Background -->
  <rect width="200" height="60" fill="#ffffff" rx="5"/>
  
  <!-- Truck Body -->
  <rect x="20" y="25" width="35" height="20" fill="#0055A4" rx="2"/>
  
  <!-- Truck Cab -->
  <rect x="55" y="20" width="20" height="25" fill="#0055A4" rx="2"/>
  
  <!-- Truck Wheels -->
  <circle cx="30" cy="50" r="6" fill="#2c3e50"/>
  <circle cx="50" cy="50" r="6" fill="#2c3e50"/>
  <circle cx="65" cy="50" r="6" fill="#2c3e50"/>
  
  <!-- Wheel centers -->
  <circle cx="30" cy="50" r="2" fill="#FFC300"/>
  <circle cx="50" cy="50" r="2" fill="#FFC300"/>
  <circle cx="65" cy="50" r="2" fill="#FFC300"/>
  
  <!-- Truck details -->
  <rect x="22" y="27" width="8" height="3" fill="#FFC300"/>
  <rect x="22" y="32" width="12" height="2" fill="#ffffff" opacity="0.8"/>
  <rect x="22" y="36" width="10" height="2" fill="#ffffff" opacity="0.8"/>
  
  <!-- Truck windows -->
  <rect x="57" y="22" width="6" height="6" fill="#87CEEB" opacity="0.7"/>
  <rect x="65" y="22" width="6" height="6" fill="#87CEEB" opacity="0.7"/>
  
  <!-- Hook/Crane -->
  <line x1="75" y1="20" x2="85" y2="15" stroke="#FFC300" stroke-width="2"/>
  <line x1="85" y1="15" x2="90" y2="20" stroke="#FFC300" stroke-width="2"/>
  <circle cx="90" cy="22" r="2" fill="#FFC300"/>
  
  <!-- Text -->
  <text x="100" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0055A4">ABSCHLEPP</text>
  <text x="100" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#2c3e50">DIENST</text>
  <text x="100" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="normal" fill="#FFC300">24/7 SERVICE</text>
  
  <!-- Accent elements -->
  <rect x="5" y="5" width="190" height="2" fill="#FFC300"/>
  <rect x="5" y="53" width="190" height="2" fill="#FFC300"/>
  
  <!-- Emergency symbol -->
  <circle cx="15" cy="15" r="8" fill="#dc3545"/>
  <text x="15" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">!</text>
</svg>
